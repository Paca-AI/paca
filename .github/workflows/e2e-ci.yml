name: e2e-ci

on:
  pull_request:
    paths:
      - "apps/e2e/**"
      - "apps/web/**"
      - "services/api/**"
      - "deploy/**"
      - ".github/workflows/e2e-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: apps/e2e

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('apps/e2e/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint

  e2e:
    name: Playwright E2E tests
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 40

    defaults:
      run:
        working-directory: apps/e2e

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # -----------------------------------------------------------------------
      # Infrastructure — build images and wait for all health checks to pass
      # -----------------------------------------------------------------------

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start E2E infrastructure
        working-directory: ${{ github.workspace }}
        run: docker compose -f deploy/docker-compose.e2e.yml up -d --build --wait
        env:
          BUILDKIT_PROGRESS: plain

      # -----------------------------------------------------------------------
      # Test runner setup
      # -----------------------------------------------------------------------

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('apps/e2e/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers and system dependencies
        run: bunx playwright install --with-deps

      # -----------------------------------------------------------------------
      # Run tests
      # -----------------------------------------------------------------------

      - name: Run Playwright E2E tests
        run: bun run test
        env:
          CI: "true"
          E2E_BASE_URL: "http://localhost"
          E2E_USERNAME: "admin"
          E2E_PASSWORD: "e2e-admin-password"

      # -----------------------------------------------------------------------
      # Artifacts
      # -----------------------------------------------------------------------

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 14

      - name: Upload test results (traces and screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apps/e2e/test-results/
          retention-days: 7

      # -----------------------------------------------------------------------
      # Cleanup — always bring down the stack, removing volumes
      # -----------------------------------------------------------------------

      - name: Tear down E2E infrastructure
        if: always()
        working-directory: ${{ github.workspace }}
        run: docker compose -f deploy/docker-compose.e2e.yml down -v
