name: web-pr-ci

on:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-pr-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  web-quality:
    name: Check, test, and build web app
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('apps/web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run code quality checks
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Build production bundle
        run: bun run build
